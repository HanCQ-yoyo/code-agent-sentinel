  # injection.exfiltration — 检测数据外发指令
  - id: injection.exfiltration.skill
    severity: critical
    description: "检测到数据外发指令(读取敏感文件并外传)"
    asset_type: skill
    match: { field: content, op: regex_match, value: "(curl|wget|fetch).+\\$\\(|(~?\\/\\.ssh|~?\\/\\.aws|\\/etc\\/passwd)" }
    deobfuscation: [base64, leetspeak]
    remediation: "该指令疑似外发敏感数据,立即移除"
  - id: injection.exfiltration.command
