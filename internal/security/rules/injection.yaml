  # injection.base64-payload — 文本含 base64 编码的可执行片段
  - id: injection.base64-payload.skill
    severity: medium
    description: "文本含 base64 编码的可执行片段"
    asset_type: skill
    match: { field: content, op: regex_match, value: "(?:base64|atob)\\s+-d\\s+['\"][A-Za-z0-9+/=]{40,}" }
    deobfuscation: [base64]
    remediation: "解码并审查 base64 载荷"
  - id: injection.base64-payload.command
    severity: medium
    description: "文本含 base64 编码的可执行片段"
