        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+dbt\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+dbt\\s+drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-dbt-drop" }
