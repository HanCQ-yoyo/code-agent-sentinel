# destructive_commands.yaml —— 危险命令检测规则
#
# 规则源自 destructive_command_guard(dcg,MIT License with OpenAI/Anthropic Rider),
# 经机械转写为 sentinel 声明式 YAML。
# dcg copyright (c) 2026 Jeffrey Emanuel(见 references/destructive_command_guard/LICENSE)。
# 转写保留原规则语义(name/severity/reason/suggestion),正则按 sentinel RE2+regexp2 引擎适配。
#
# 命名空间:destructive.<domain>.<pattern>
# severity 对齐 dcg 枚举:critical/high/medium/low(健康分系数见 health.go:23)
# safe_pattern(白名单)映射为对应 dest 规则的 post_exclude(命中后排除安全子模式)。
# 含 lookahead/lookbehind 的正则走 regexp2(Task 1 分流)。
#
# 资产路由:asset_type 覆盖 hook(command)/script|skill|command|agent|memory(content)/
# mcp_server(command+args)/permissions(allow)。同一规则对多 asset_type 用 or 树。
# 因 RulesDetector.Covers() 返回 nil(全资产路由),规则按 asset_type 字段自动路由。

rules:
  # ===== git 域(源 dcg core/git.rs:4207-4462,12 dest + 6 safe→post_exclude)=====
  # severity 直接映射 dcg 枚举(reset-hard/clean-force/push-force-*/stash-clear=Critical;
  # checkout-*/restore-*/reset-merge/branch-force-delete=High;stash-drop=Medium)。
  # 正则适配:[[:alnum:]_]→\w;(?:^|[^[:alnum:]_-])→(?:^|[^\w-]);YAML 双引号内 \\。

  - id: destructive.git.checkout-discard
    severity: high
    asset_type: hook
    description: "git checkout -- 丢弃未提交改动,不可恢复。先用 git stash。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+--\\s+" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+--\\s+" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+--\\s+" }
    post_exclude:
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+-b\\s+"        # safe: checkout-new-branch
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+--orphan\\s+"  # safe: checkout-orphan
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.checkout-discard" }
    remediation: "改用 git stash 保存改动,git diff 预览后再丢弃"

  - id: destructive.git.checkout-ref-discard
    severity: high
    asset_type: hook
    description: "git checkout <ref> -- <path> 覆盖工作区。先用 git stash。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+(?!-b\\b)(?!--orphan\\b)[^\\s]+\\s+--\\s+" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+(?!-b\\b)(?!--orphan\\b)[^\\s]+\\s+--\\s+" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+(?!-b\\b)(?!--orphan\\b)[^\\s]+\\s+--\\s+" }
    post_exclude:
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+-b\\s+"        # safe: checkout-new-branch
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*checkout\\s+--orphan\\s+"  # safe: checkout-orphan
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.checkout-ref-discard" }
    remediation: "改用 git stash 保存改动,git show <ref>:<path> 预览后再覆盖"

  - id: destructive.git.restore-worktree
    severity: high
    asset_type: hook
    description: "git restore 丢弃未提交改动。先用 git stash 或 git diff。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?!.*\\s(?:--staged|-S)\\b)" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?!.*\\s(?:--staged|-S)\\b)" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?!.*\\s(?:--staged|-S)\\b)" }
    post_exclude:
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?=.*\\s--staged\\b)(?!.*\\s(?:--worktree|-W)\\b)"  # safe: restore-staged-long
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?=.*\\s-S\\b)(?!.*\\s(?:--worktree|-W)\\b)"       # safe: restore-staged-short
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.restore-worktree" }
    remediation: "改用 git restore --staged 仅取消暂存,或 git stash 保存改动"

  - id: destructive.git.restore-worktree-explicit
    severity: high
    asset_type: hook
    description: "git restore --worktree/-W 显式丢弃工作区改动,不可恢复。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\s+.*(?:--worktree|-W\\b)" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\s+.*(?:--worktree|-W\\b)" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\s+.*(?:--worktree|-W\\b)" }
    post_exclude:
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?=.*\\s--staged\\b)(?!.*\\s(?:--worktree|-W)\\b)"  # safe: restore-staged-long
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*restore\\b(?=\\s)(?=.*\\s-S\\b)(?!.*\\s(?:--worktree|-W)\\b)"       # safe: restore-staged-short
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.restore-worktree-explicit" }
    remediation: "改用 git restore --staged 仅取消暂存,保留工作区改动"

  - id: destructive.git.reset-hard
    severity: critical
    asset_type: hook
    description: "git reset --hard 丢弃工作区与暂存区改动,不可恢复。先用 git stash。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*reset\\s+--hard\\b" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*reset\\s+--hard\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*reset\\s+--hard\\b" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.reset-hard" }
    remediation: "改用 git stash 保存改动,确认后再 reset"

  - id: destructive.git.reset-merge
    severity: high
    asset_type: hook
    description: "git reset --merge 可能丢失未提交改动。先用 git stash。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*reset\\s+--merge\\b" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*reset\\s+--merge\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*reset\\s+--merge\\b" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.reset-merge" }
    remediation: "改用 git stash 保存改动,git merge --abort 安全中止合并"

  - id: destructive.git.clean-force
    severity: critical
    asset_type: hook
    description: "git clean -f/--force 永久删除未跟踪文件。先用 git clean -n 预览。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*clean\\s+(?:-[a-z]*f|--force\\b)" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*clean\\s+(?:-[a-z]*f|--force\\b)" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*clean\\s+(?:-[a-z]*f|--force\\b)" }
    post_exclude:
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*clean\\s+-[a-z]*n[a-z]*"  # safe: clean-dry-run-short
      - "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*clean\\s+--dry-run"       # safe: clean-dry-run-long
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.clean-force" }
    remediation: "改用 git clean -n 预览,git clean -i 交互选择"

  - id: destructive.git.push-force-long
    severity: critical
    asset_type: hook
    description: "git push --force 会覆盖远程历史。改用 --force-with-lease。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:[^\\s&;|`()<>]+\\s+)*push\\s+(?:[^\\s&;|`()<>]+\\s+)*--force(?![-a-z])" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:[^\\s&;|`()<>]+\\s+)*push\\s+(?:[^\\s&;|`()<>]+\\s+)*--force(?![-a-z])" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:[^\\s&;|`()<>]+\\s+)*push\\s+(?:[^\\s&;|`()<>]+\\s+)*--force(?![-a-z])" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.push-force-long" }
    remediation: "改用 git push --force-with-lease,失败说明远程有新提交"

  - id: destructive.git.push-force-short
    severity: critical
    asset_type: hook
    description: "git push -f 会覆盖远程历史。改用 --force-with-lease。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:[^\\s&;|`()<>]+\\s+)*push\\s+(?:[^\\s&;|`()<>]+\\s+)*-[a-zA-Z]*f[a-zA-Z]*\\b" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:[^\\s&;|`()<>]+\\s+)*push\\s+(?:[^\\s&;|`()<>]+\\s+)*-[a-zA-Z]*f[a-zA-Z]*\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:[^\\s&;|`()<>]+\\s+)*push\\s+(?:[^\\s&;|`()<>]+\\s+)*-[a-zA-Z]*f[a-zA-Z]*\\b" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.push-force-short" }
    remediation: "改用 git push --force-with-lease,失败说明远程有新提交"

  - id: destructive.git.branch-force-delete
    severity: high
    asset_type: hook
    description: "git branch 删除/强制更新引用需用户明确确认。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])(?i:(?:git(?:\\.exe)?\\s+(?:[^\\s&;|`()<>]+\\s+)*branch|git-branch(?:\\.exe)?))\\s+(?:[^\\s&;|`()<>]+\\s+)*(?:-[a-zA-Z]*[dDfMC][a-zA-Z]*(?:\\s|$)|--(?:d(?:e(?:l(?:e(?:t(?:e)?)?)?)?)?|forc(?:e)?)(?:\\s|$))" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])(?i:(?:git(?:\\.exe)?\\s+(?:[^\\s&;|`()<>]+\\s+)*branch|git-branch(?:\\.exe)?))\\s+(?:[^\\s&;|`()<>]+\\s+)*(?:-[a-zA-Z]*[dDfMC][a-zA-Z]*(?:\\s|$)|--(?:d(?:e(?:l(?:e(?:t(?:e)?)?)?)?)?|forc(?:e)?)(?:\\s|$))" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])(?i:(?:git(?:\\.exe)?\\s+(?:[^\\s&;|`()<>]+\\s+)*branch|git-branch(?:\\.exe)?))\\s+(?:[^\\s&;|`()<>]+\\s+)*(?:-[a-zA-Z]*[dDfMC][a-zA-Z]*(?:\\s|$)|--(?:d(?:e(?:l(?:e(?:t(?:e)?)?)?)?)?|forc(?:e)?)(?:\\s|$))" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.branch-force-delete" }
    remediation: "先 git branch -vv / --merged 检查,确认后再删除"

  - id: destructive.git.stash-drop
    severity: medium
    asset_type: hook
    description: "git stash drop 删除单条 stash。可通过 git fsck 恢复。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*stash\\s+drop\\b" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*stash\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*stash\\s+drop\\b" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.stash-drop" }
    remediation: "改用 git stash pop(成功才删除)或 git stash apply(不删除)"

  - id: destructive.git.stash-clear
    severity: critical
    asset_type: hook
    description: "git stash clear 永久删除所有 stash,难以恢复。"
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*stash\\s+clear\\b" }
        - { field: content, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*stash\\s+clear\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[^\\w-])git\\s+(?:\\S+\\s+)*stash\\s+clear\\b" }
    metadata: { source: dcg, domain: git, dcg_rule_id: "git.stash-clear" }
    remediation: "改用 git stash drop stash@{n} 逐条删除,先 git stash list 检查"
  # ===== filesystem 域(源 dcg core/filesystem.rs,26 dest + 32 safe→post_exclude)=====
  # severity 直接映射 dcg 枚举(见各规则注释)。
  # 正则适配:dcg 原始 regex 经 sentinel 适配——root-home 规则扩展 [^|;&\s]* 消费路径 token,
  # 使 hitCtx 包含完整路径,从而 post_exclude 可区分 /tmp(安全)与 /etc(危险)。
  # safe_pattern(32 条)映射为对应 dest 规则的 post_exclude,正则适配为 hitCtx 子串匹配。
  # lookahead/lookbehind 走 regexp2(Task 1 分流)。YAML 双引号内 \ 双写、" 转义。

  - id: destructive.filesystem.sed-exec-unverified
    severity: high
    asset_type: hook
    description: "GNU sed executes shell input that dcg cannot statically verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: filesystem, dcg_rule_id: "filesystem.sed-exec-unverified" }
    remediation: "参考 dcg 建议:使用具体路径、先 ls/find 预览、或改用安全替代命令"

  - id: destructive.filesystem.cp-sensitive-then-delete
    severity: critical
    asset_type: hook
    description: "archive copy of a sensitive path into temp followed by forced recursive deletion is a cross-segment data-loss bypass. EXTREMELY DANGEROUS."
    match:
      or:
        - { field: command, op: regex_match, value: "\\bcp\\b[^|;&]*(?:\\s(?:-[A-Za-z]*a[A-Za-z]*|--archive)\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/(?:etc|usr|bin|sbin|root|boot|lib|lib64|var|home|sys|proc|dev|opt)(?:/|(?=[\\s\\)'\"]|$))|/(?=[\\s\\)'\"]|$)|~(?=\\s|$|/|\\))|\\$\\{?HOME\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)[^|;&\\s'\"]*[^|;&]*(?:&&|;|\\|\\|)[^|;&]*\\brm\\b[^|;&]*\\s(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|-[rR]\\s+-f|-f\\s+-[rR]|--recursive\\s+--force|--force\\s+--recursive)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)" }
        - { field: content, op: regex_match, value: "\\bcp\\b[^|;&]*(?:\\s(?:-[A-Za-z]*a[A-Za-z]*|--archive)\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/(?:etc|usr|bin|sbin|root|boot|lib|lib64|var|home|sys|proc|dev|opt)(?:/|(?=[\\s\\)'\"]|$))|/(?=[\\s\\)'\"]|$)|~(?=\\s|$|/|\\))|\\$\\{?HOME\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)[^|;&\\s'\"]*[^|;&]*(?:&&|;|\\|\\|)[^|;&]*\\brm\\b[^|;&]*\\s(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|-[rR]\\s+-f|-f\\s+-[rR]|--recursive\\s+--force|--force\\s+--recursive)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)" }
        - { field: allow, op: regex_match, value: "\\bcp\\b[^|;&]*(?:\\s(?:-[A-Za-z]*a[A-Za-z]*|--archive)\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/(?:etc|usr|bin|sbin|root|boot|lib|lib64|var|home|sys|proc|dev|opt)(?:/|(?=[\\s\\)'\"]|$))|/(?=[\\s\\)'\"]|$)|~(?=\\s|$|/|\\))|\\$\\{?HOME\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)[^|;&\\s'\"]*[^|;&]*(?:&&|;|\\|\\|)[^|;&]*\\brm\\b[^|;&]*\\s(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|-[rR]\\s+-f|-f\\s+-[rR]|--recursive\\s+--force|--force\\s+--recursive)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)" }
    metadata: { source: dcg, domain: filesystem, dcg_rule_id: "filesystem.cp-sensitive-then-delete" }
    remediation: "参考 dcg 建议:使用具体路径、先 ls/find 预览、或改用安全替代命令"

  - id: destructive.filesystem.ln-symlink-sensitive-then-delete
    severity: critical
    asset_type: hook
    description: "symlink from a sensitive path into temp followed by forced recursive deletion can traverse and destroy the target. EXTREMELY DANGEROUS."
    match:
      or:
        - { field: command, op: regex_match, value: "\\bln\\b[^|;&]*\\s-[A-Za-z]*s[A-Za-z]*[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/(?:etc|usr|bin|sbin|root|boot|lib|lib64|var|home|sys|proc|dev|opt)(?:/|(?=[\\s\\)'\"]|$))|/(?=[\\s\\)'\"]|$)|~(?=\\s|$|/|\\))|\\$\\{?HOME\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)[^|;&\\s'\"]*[^|;&]*(?:&&|;|\\|\\|)[^|;&]*\\brm\\b[^|;&]*\\s(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|-[rR]\\s+-f|-f\\s+-[rR]|--recursive\\s+--force|--force\\s+--recursive)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)" }
        - { field: content, op: regex_match, value: "\\bln\\b[^|;&]*\\s-[A-Za-z]*s[A-Za-z]*[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/(?:etc|usr|bin|sbin|root|boot|lib|lib64|var|home|sys|proc|dev|opt)(?:/|(?=[\\s\\)'\"]|$))|/(?=[\\s\\)'\"]|$)|~(?=\\s|$|/|\\))|\\$\\{?HOME\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)[^|;&\\s'\"]*[^|;&]*(?:&&|;|\\|\\|)[^|;&]*\\brm\\b[^|;&]*\\s(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|-[rR]\\s+-f|-f\\s+-[rR]|--recursive\\s+--force|--force\\s+--recursive)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)" }
        - { field: allow, op: regex_match, value: "\\bln\\b[^|;&]*\\s-[A-Za-z]*s[A-Za-z]*[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/(?:etc|usr|bin|sbin|root|boot|lib|lib64|var|home|sys|proc|dev|opt)(?:/|(?=[\\s\\)'\"]|$))|/(?=[\\s\\)'\"]|$)|~(?=\\s|$|/|\\))|\\$\\{?HOME\\b)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)[^|;&\\s'\"]*[^|;&]*(?:&&|;|\\|\\|)[^|;&]*\\brm\\b[^|;&]*\\s(?:-[A-Za-z]*[rR][A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*[rR][A-Za-z]*|-[rR]\\s+-f|-f\\s+-[rR]|--recursive\\s+--force|--force\\s+--recursive)[^|;&]*?(?:\\s|=)(?:['\"\\\\]|\\$['\"])?(?:/tmp/|/var/tmp/|\\$TMPDIR/|\\$\\{TMPDIR\\}/)" }
