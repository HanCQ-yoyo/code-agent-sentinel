  # ===== database.mongodb 域(源 dcg database/mongodb.rs,6 dest + 5 safe)=====
  # severity 直接映射 dcg 枚举(drop-database=Critical;drop-collection/delete-all/
  # mongorestore-drop/collection-drop=High;stdin-unverified=High)。
  # dcg safe_pattern(5 条)针对整条命令做 ^-anchored 负向 lookahead,确保含破坏性方法
  # 时不放行 read 操作。sentinel 中 destructive 正则只匹配破坏性方法本身(.dropDatabase()
  # / .drop() / .deleteMany({}) 等),read 操作(find/count/aggregate/explain)不匹配,
  # 故无 false-positive 风险;post_exclude 不适用(hitCtx 子串不含全命令上下文)。

  - id: destructive.database.mongodb.stdin-unverified
    severity: high
    asset_type: hook
    description: "mongosh receives indirect input that dcg cannot statically verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mongodb.stdin-unverified" }
    remediation: "Materialize and review the exact JavaScript before piping or redirecting it into mongosh."

  - id: destructive.database.mongodb.drop-database
    severity: critical
    asset_type: hook
    description: "dropDatabase permanently deletes the entire database."
    match:
      or:
        - { field: command, op: regex_match, value: "\\.dropDatabase\\s*\\(" }
        - { field: content, op: regex_match, value: "\\.dropDatabase\\s*\\(" }
        - { field: allow, op: regex_match, value: "\\.dropDatabase\\s*\\(" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mongodb.drop-database" }
    remediation: "dropDatabase() removes the current database completely. Backup first: mongodump --db=dbname --out=/path/to/backup"

  - id: destructive.database.mongodb.drop-collection
    severity: high
    asset_type: hook
    description: "drop/dropCollection permanently deletes the collection."
    match:
      or:
        - { field: command, op: regex_match, value: "\\.drop\\s*\\(\\s*\\)|\\.dropCollection\\s*\\(" }
        - { field: content, op: regex_match, value: "\\.drop\\s*\\(\\s*\\)|\\.dropCollection\\s*\\(" }
        - { field: allow, op: regex_match, value: "\\.drop\\s*\\(\\s*\\)|\\.dropCollection\\s*\\(" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mongodb.drop-collection" }
    remediation: "drop() removes the entire collection. Backup first: mongodump --db=dbname --collection=collname"

  - id: destructive.database.mongodb.delete-all
    severity: high
    asset_type: hook
    description: "remove({}) or deleteMany({}) deletes ALL documents. Add filter criteria."
    match:
      or:
        - { field: command, op: regex_match, value: "\\.(?:remove|deleteMany)\\s*\\(\\s*\\{\\s*\\}\\s*\\)" }
        - { field: content, op: regex_match, value: "\\.(?:remove|deleteMany)\\s*\\(\\s*\\{\\s*\\}\\s*\\)" }
        - { field: allow, op: regex_match, value: "\\.(?:remove|deleteMany)\\s*\\(\\s*\\{\\s*\\}\\s*\\)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mongodb.delete-all" }
    remediation: "An empty filter {} matches ALL documents. Add filter criteria: db.collection.deleteMany({ status: 'expired' })"

  - id: destructive.database.mongodb.mongorestore-drop
    severity: high
    asset_type: hook
    description: "mongorestore --drop deletes existing data before restoring."
    match:
      or:
        - { field: command, op: regex_match, value: "mongorestore\\s+.*--drop" }
        - { field: content, op: regex_match, value: "mongorestore\\s+.*--drop" }
        - { field: allow, op: regex_match, value: "mongorestore\\s+.*--drop" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mongodb.mongorestore-drop" }
    remediation: "mongorestore --drop drops collections before restoring them. Restore to a different database first or remove --drop."

  - id: destructive.database.mongodb.collection-drop
    severity: high
    asset_type: hook
    description: "collection.drop() permanently deletes the collection."
    match:
      or:
        - { field: command, op: regex_match, value: "db\\.[a-zA-Z_][a-zA-Z0-9_]*\\.drop\\s*\\(" }
        - { field: content, op: regex_match, value: "db\\.[a-zA-Z_][a-zA-Z0-9_]*\\.drop\\s*\\(" }
        - { field: allow, op: regex_match, value: "db\\.[a-zA-Z_][a-zA-Z0-9_]*\\.drop\\s*\\(" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mongodb.collection-drop" }
    remediation: "db.<collection>.drop() deletes the collection and all documents. Backup first and check stats."

  # ===== database.mysql 域(源 dcg database/mysql.rs,11 dest + 5 safe)=====
  # severity 直接映射 dcg 枚举(drop-database/mysqladmin-drop/reset-master=Critical;
  # drop-table/truncate-table/delete-without-where/mysqldump-add-drop-database/grant-all=High;
  # mysqldump-add-drop-table/drop-user=Medium;stdin-unverified=High)。
  # dcg safe_pattern(5 条:select/show/describe/mysqldump-no-drop/mysql-select)针对整条
  # 命令做 ^-anchored 匹配。sentinel 中 destructive 正则只匹配破坏性 SQL 关键字
  # (DROP DATABASE/TABLE/TRUNCATE/DELETE FROM/RESET MASTER 等),read 操作不匹配,
  # 故无 false-positive 风险;post_exclude 不适用。
  # delete-without-where 正则要求表名后紧跟 ; 或 $,带 WHERE 子句不匹配(忠实 dcg 语义)。

  - id: destructive.database.mysql.stdin-unverified
    severity: high
    asset_type: hook
    description: "mysql/mariadb receives indirect input that dcg cannot statically verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.stdin-unverified" }
    remediation: "Materialize and review the exact SQL before piping or redirecting it into the client."

  - id: destructive.database.mysql.drop-database
    severity: critical
    asset_type: hook
    description: "DROP DATABASE permanently deletes the entire database. Verify and back up first."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+DATABASE\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+DATABASE\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+DATABASE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.drop-database" }
    remediation: "Backup first: mysqldump -h host -u user -p dbname > backup.sql. Verify: SHOW DATABASES LIKE 'dbname'."

  - id: destructive.database.mysql.drop-table
    severity: high
    asset_type: hook
    description: "DROP TABLE permanently deletes the table. Verify and back up first."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.drop-table" }
    remediation: "Backup table first: mysqldump dbname tablename > table_backup.sql. Preview: SELECT COUNT(*) FROM tablename."

  - id: destructive.database.mysql.truncate-table
    severity: high
    asset_type: hook
    description: "TRUNCATE permanently deletes all rows. Cannot be rolled back in MySQL."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)TRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
        - { field: content, op: regex_match, value: "(?i)TRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
        - { field: allow, op: regex_match, value: "(?i)TRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.truncate-table" }
    remediation: "TRUNCATE is non-transactional in MySQL. Check row count first: SELECT COUNT(*) FROM tablename."

  - id: destructive.database.mysql.delete-without-where
    severity: high
    asset_type: hook
    description: "DELETE without WHERE clause deletes ALL rows. Add a WHERE clause."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+(?:(?:[a-zA-Z_][a-zA-Z0-9_]*|`[^`]+`)(?:\\.(?:[a-zA-Z_][a-zA-Z0-9_]*|`[^`]+`))?)\\s*(?:;|$)" }
        - { field: content, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+(?:(?:[a-zA-Z_][a-zA-Z0-9_]*|`[^`]+`)(?:\\.(?:[a-zA-Z_][a-zA-Z0-9_]*|`[^`]+`))?)\\s*(?:;|$)" }
        - { field: allow, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+(?:(?:[a-zA-Z_][a-zA-Z0-9_]*|`[^`]+`)(?:\\.(?:[a-zA-Z_][a-zA-Z0-9_]*|`[^`]+`))?)\\s*(?:;|$)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.delete-without-where" }
    remediation: "Add a WHERE clause: DELETE FROM tablename WHERE condition. Preview: SELECT COUNT(*) FROM tablename."

  - id: destructive.database.mysql.mysqladmin-drop
    severity: critical
    asset_type: hook
    description: "mysqladmin drop permanently deletes the database. Verify carefully."
    match:
      or:
        - { field: command, op: regex_match, value: "mysqladmin\\s+.*drop\\b" }
        - { field: content, op: regex_match, value: "mysqladmin\\s+.*drop\\b" }
        - { field: allow, op: regex_match, value: "mysqladmin\\s+.*drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.mysqladmin-drop" }
    remediation: "mysqladmin drop is CLI equivalent of DROP DATABASE. Backup first: mysqldump dbname > backup.sql."

  - id: destructive.database.mysql.mysqldump-add-drop-database
    severity: high
    asset_type: hook
    description: "mysqldump --add-drop-database drops the database before restore."
    match:
      or:
        - { field: command, op: regex_match, value: "mysqldump\\s+.*--add-drop-database" }
        - { field: content, op: regex_match, value: "mysqldump\\s+.*--add-drop-database" }
        - { field: allow, op: regex_match, value: "mysqldump\\s+.*--add-drop-database" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.mysqldump-add-drop-database" }
    remediation: "Restore to a new database first. Without --add-drop-database: mysqldump dbname > backup.sql."

  - id: destructive.database.mysql.mysqldump-add-drop-table
    severity: medium
    asset_type: hook
    description: "mysqldump --add-drop-table drops tables before creating them on restore."
    match:
      or:
        - { field: command, op: regex_match, value: "mysqldump\\s+.*--add-drop-table" }
        - { field: content, op: regex_match, value: "mysqldump\\s+.*--add-drop-table" }
        - { field: allow, op: regex_match, value: "mysqldump\\s+.*--add-drop-table" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.mysqldump-add-drop-table" }
    remediation: "Use --skip-add-drop-table to disable drops: mysqldump --skip-add-drop-table dbname > backup.sql."

  - id: destructive.database.mysql.grant-all
    severity: high
    asset_type: hook
    description: "GRANT ALL ON *.* gives unrestricted access to all databases."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)GRANT\\s+ALL\\s+(?:PRIVILEGES\\s+)?ON\\s+\\*\\.\\*" }
        - { field: content, op: regex_match, value: "(?i)GRANT\\s+ALL\\s+(?:PRIVILEGES\\s+)?ON\\s+\\*\\.\\*" }
        - { field: allow, op: regex_match, value: "(?i)GRANT\\s+ALL\\s+(?:PRIVILEGES\\s+)?ON\\s+\\*\\.\\*" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.grant-all" }
    remediation: "Limit to specific database: GRANT ALL ON specific_db.* TO 'user'@'host'."

  - id: destructive.database.mysql.drop-user
    severity: medium
    asset_type: hook
    description: "DROP USER permanently removes the user account and all their privileges."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+USER\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+USER\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+USER\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.drop-user" }
    remediation: "Document privileges first: SHOW GRANTS FOR 'user'@'host'. Consider: ALTER USER 'user'@'host' ACCOUNT LOCK."

  - id: destructive.database.mysql.reset-master
    severity: critical
    asset_type: hook
    description: "RESET MASTER deletes all binary logs and resets the binlog position."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bRESET\\s+MASTER\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bRESET\\s+MASTER\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bRESET\\s+MASTER\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "mysql.reset-master" }
    remediation: "Use PURGE BINARY LOGS BEFORE 'date' for selective cleanup. Check replicas first: SHOW SLAVE STATUS."

  # ===== database.postgresql 域(源 dcg database/postgresql.rs,8 dest + 2 safe)=====
  # severity 直接映射 dcg 枚举(drop-database/drop-schema/dropdb-cli=Critical;
  # drop-table/truncate-table/delete-without-where/pg-dump-clean=High;
  # stdin-unverified=High)。
  # dcg safe_pattern(2 条:pg-dump-no-clean/select-query)无需 post_exclude:
  # destructive 正则只匹配破坏性 SQL 关键字或 --clean/-c 标志,read 操作不匹配。
  # delete-without-where 正则支持 PostgreSQL 双引号标识符("Users"),忠实 dcg。

  - id: destructive.database.postgresql.stdin-unverified
    severity: high
    asset_type: hook
    description: "psql receives indirect input that dcg cannot statically verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.stdin-unverified" }
    remediation: "Materialize and review the exact SQL before piping or redirecting it into psql."

  - id: destructive.database.postgresql.drop-database
    severity: critical
    asset_type: hook
    description: "DROP DATABASE permanently deletes the entire database (even with IF EXISTS). Verify and back up first."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+DATABASE\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+DATABASE\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+DATABASE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.drop-database" }
    remediation: "Backup first: pg_dump -h host -U user dbname > backup.sql. Verify: psql -c '\\l' | grep dbname."

  - id: destructive.database.postgresql.drop-table
    severity: high
    asset_type: hook
    description: "DROP TABLE permanently deletes the table (even with IF EXISTS). Verify and back up first."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.drop-table" }
    remediation: "Backup table first: pg_dump -t tablename dbname > table_backup.sql. Preview: SELECT COUNT(*) FROM tablename."

  - id: destructive.database.postgresql.drop-schema
    severity: critical
    asset_type: hook
    description: "DROP SCHEMA permanently deletes the schema and all its objects (even with IF EXISTS)."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+SCHEMA\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+SCHEMA\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+SCHEMA\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.drop-schema" }
    remediation: "List schema contents first. Backup: pg_dump -n schema_name dbname > schema_backup.sql. Use RESTRICT to fail if not empty."

  - id: destructive.database.postgresql.truncate-table
    severity: high
    asset_type: hook
    description: "TRUNCATE permanently deletes all rows without logging individual deletions."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bTRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
        - { field: content, op: regex_match, value: "(?i)\\bTRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
        - { field: allow, op: regex_match, value: "(?i)\\bTRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.truncate-table" }
    remediation: "Wrap in transaction: BEGIN; TRUNCATE tablename; -- verify, then COMMIT or ROLLBACK."

  - id: destructive.database.postgresql.delete-without-where
    severity: high
    asset_type: hook
    description: "DELETE without WHERE clause deletes ALL rows. Add a WHERE clause or use TRUNCATE intentionally."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+(?:(?:[a-zA-Z_][a-zA-Z0-9_]*|\"[^\"]+\")(?:\\.(?:[a-zA-Z_][a-zA-Z0-9_]*|\"[^\"]+\"))?)\\s*(?:;|$)" }
        - { field: content, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+(?:(?:[a-zA-Z_][a-zA-Z0-9_]*|\"[^\"]+\")(?:\\.(?:[a-zA-Z_][a-zA-Z0-9_]*|\"[^\"]+\"))?)\\s*(?:;|$)" }
        - { field: allow, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+(?:(?:[a-zA-Z_][a-zA-Z0-9_]*|\"[^\"]+\")(?:\\.(?:[a-zA-Z_][a-zA-Z0-9_]*|\"[^\"]+\"))?)\\s*(?:;|$)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.delete-without-where" }
    remediation: "Add a WHERE clause: DELETE FROM tablename WHERE condition. Preview: SELECT COUNT(*) FROM tablename."

  - id: destructive.database.postgresql.dropdb-cli
    severity: critical
    asset_type: hook
    description: "dropdb permanently deletes the entire database. Verify the database name carefully."
    match:
      or:
        - { field: command, op: regex_match, value: "\\bdropdb\\s+" }
        - { field: content, op: regex_match, value: "\\bdropdb\\s+" }
        - { field: allow, op: regex_match, value: "\\bdropdb\\s+" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.dropdb-cli" }
    remediation: "dropdb is CLI equivalent of DROP DATABASE. Backup first: pg_dump dbname > backup.sql. List: psql -c '\\l'."

  - id: destructive.database.postgresql.pg-dump-clean
    severity: high
    asset_type: hook
    description: "pg_dump --clean drops objects before creating them. This can be destructive on restore."
    match:
      or:
        - { field: command, op: regex_match, value: "pg_dump\\s+.*(?:--clean|-c\\b)" }
        - { field: content, op: regex_match, value: "pg_dump\\s+.*(?:--clean|-c\\b)" }
        - { field: allow, op: regex_match, value: "pg_dump\\s+.*(?:--clean|-c\\b)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "postgresql.pg-dump-clean" }
    remediation: "Restore to a new database first. Without --clean: pg_dump dbname > backup.sql."

  # ===== database.redis 域(源 dcg database/redis.rs,14 dest + 6 safe)=====
  # severity 直接映射 dcg 枚举(flushall/debug-crash/config-dangerous/
  # config-set-maxmemory/config-set-maxmemory-policy=Critical;
  # flushdb/debug-sleep/shutdown/config-set-save/config-set-appendonly/
  # config-rewrite/mass-delete-pipeline=High;config-resetstat=Medium;
  # stdin-unverified=High)。
  # dcg safe_pattern(6 条:get/scan/info/keys/dbsize/config-get)含 ^-anchored 负向
  # lookahead,确保含破坏性关键字时不放行 read 操作。sentinel 中 destructive 正则
  # 只匹配破坏性命令(FLUSHALL/FLUSHDB/DEBUG SEGFAULT/CONFIG SET 等),
  # read 操作(GET/SCAN/INFO/KEYS/DBSIZE/CONFIG GET)不匹配,故无 false-positive。
  # 正则完全按 dcg 源(无 redis-cli 前缀锚定),忠实 dcg keyword gate 语义:
  # dcg 关键字含 FLUSHALL/FLUSHDB/DEBUG 等,含这些字的命令即触发包,正则再匹配。

  - id: destructive.database.redis.stdin-unverified
    severity: high
    asset_type: hook
    description: "redis-cli receives indirect input that dcg cannot statically verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.stdin-unverified" }
    remediation: "Materialize and review the exact Redis commands before piping or redirecting them into the client."

  - id: destructive.database.redis.flushall
    severity: critical
    asset_type: hook
    description: "FLUSHALL permanently deletes ALL keys in ALL databases."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bFLUSHALL\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bFLUSHALL\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bFLUSHALL\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.flushall" }
    remediation: "Check database sizes first: INFO keyspace / DBSIZE. Consider FLUSHDB (current db only) or DEL specific keys."

  - id: destructive.database.redis.flushdb
    severity: high
    asset_type: hook
    description: "FLUSHDB permanently deletes ALL keys in the current database."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bFLUSHDB\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bFLUSHDB\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bFLUSHDB\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.flushdb" }
    remediation: "Check current database and key count: CLIENT INFO / DBSIZE. Prefer audited per-key cleanup."

  - id: destructive.database.redis.config-resetstat
    severity: medium
    asset_type: hook
    description: "CONFIG RESETSTAT clears Redis runtime counters and can hide recent incidents."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+RESETSTAT\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+RESETSTAT\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+RESETSTAT\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-resetstat" }
    remediation: "Capture INFO and monitoring data first, then run this manually only when resetting counters is intentional."

  - id: destructive.database.redis.mass-delete-pipeline
    severity: high
    asset_type: hook
    description: "Redis KEYS/SCAN piped to DEL/UNLINK can delete many keys at once."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bredis-cli\\b.*\\b(?:KEYS\\b|--scan\\b|SCAN\\b).*\\|\\s*xargs\\s+(?:-\\S+(?:\\s+\\S+)?\\s+)*redis-cli(?:\\s+\\S+)*\\s+(?:DEL|UNLINK)\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bredis-cli\\b.*\\b(?:KEYS\\b|--scan\\b|SCAN\\b).*\\|\\s*xargs\\s+(?:-\\S+(?:\\s+\\S+)?\\s+)*redis-cli(?:\\s+\\S+)*\\s+(?:DEL|UNLINK)\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bredis-cli\\b.*\\b(?:KEYS\\b|--scan\\b|SCAN\\b).*\\|\\s*xargs\\s+(?:-\\S+(?:\\s+\\S+)?\\s+)*redis-cli(?:\\s+\\S+)*\\s+(?:DEL|UNLINK)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.mass-delete-pipeline" }
    remediation: "Inspect first: redis-cli --scan --pattern 'prefix:*' | head -50. Count and back up before selective deletion."

  - id: destructive.database.redis.debug-crash
    severity: critical
    asset_type: hook
    description: "DEBUG SEGFAULT/CRASH will crash the Redis server."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDEBUG\\s+(?:SEGFAULT|CRASH)\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDEBUG\\s+(?:SEGFAULT|CRASH)\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDEBUG\\s+(?:SEGFAULT|CRASH)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.debug-crash" }
    remediation: "These commands should be disabled in production: CONFIG SET debug-command no."

  - id: destructive.database.redis.debug-sleep
    severity: high
    asset_type: hook
    description: "DEBUG SLEEP blocks the Redis server and can cause availability issues."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDEBUG\\s+SLEEP\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDEBUG\\s+SLEEP\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDEBUG\\s+SLEEP\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.debug-sleep" }
    remediation: "Disable in production: CONFIG SET debug-command no."

  - id: destructive.database.redis.shutdown
    severity: high
    asset_type: hook
    description: "SHUTDOWN stops the Redis server. SHUTDOWN NOSAVE risks data loss."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bSHUTDOWN\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bSHUTDOWN\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bSHUTDOWN\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.shutdown" }
    remediation: "Check for unsaved changes: INFO persistence (rdb_changes_since_last_save). Ensure proper restart mechanism."

  - id: destructive.database.redis.config-dangerous
    severity: critical
    asset_type: hook
    description: "CONFIG SET for dir/dbfilename/slaveof/replicaof can be used for security attacks."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+(?:dir|dbfilename|slaveof|replicaof)\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+(?:dir|dbfilename|slaveof|replicaof)\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+(?:dir|dbfilename|slaveof|replicaof)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-dangerous" }
    remediation: "Disable in production: rename-command CONFIG \"\". Use ACLs to restrict these commands."

  - id: destructive.database.redis.config-set-maxmemory
    severity: critical
    asset_type: hook
    description: "CONFIG SET maxmemory can trigger immediate mass key eviction if new limit is below current usage."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+maxmemory\\b(?:\\s|$)" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+maxmemory\\b(?:\\s|$)" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+maxmemory\\b(?:\\s|$)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-set-maxmemory" }
    remediation: "Check current usage first: INFO memory (used_memory vs maxmemory). Prefer gradual reduction."

  - id: destructive.database.redis.config-set-maxmemory-policy
    severity: critical
    asset_type: hook
    description: "CONFIG SET maxmemory-policy changes how Redis evicts keys, risking silent data loss."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+maxmemory-policy\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+maxmemory-policy\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+maxmemory-policy\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-set-maxmemory-policy" }
    remediation: "Check current policy: CONFIG GET maxmemory-policy. Ensure application handles new eviction behavior."

  - id: destructive.database.redis.config-set-save
    severity: high
    asset_type: hook
    description: "CONFIG SET save can disable RDB persistence entirely, risking data loss on restart."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+save\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+save\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+save\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-set-save" }
    remediation: "Check current persistence: CONFIG GET save / CONFIG GET appendonly. Ensure at least one persistence mechanism remains active."

  - id: destructive.database.redis.config-set-appendonly
    severity: high
    asset_type: hook
    description: "CONFIG SET appendonly can disable AOF persistence, risking data loss on restart."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+appendonly\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+appendonly\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+SET\\s+appendonly\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-set-appendonly" }
    remediation: "Check other persistence mechanisms: CONFIG GET save. Ensure at least one remains active."

  - id: destructive.database.redis.config-rewrite
    severity: high
    asset_type: hook
    description: "CONFIG REWRITE persists all runtime CONFIG SET changes to redis.conf permanently."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bCONFIG\\s+REWRITE\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bCONFIG\\s+REWRITE\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bCONFIG\\s+REWRITE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "redis.config-rewrite" }
    remediation: "Review current runtime changes first: CONFIG GET *. Ensure no dangerous CONFIG SET changes are pending."

  # ===== database.sqlite 域(源 dcg database/sqlite.rs,5 dest + 4 safe)=====
  # severity 直接映射 dcg 枚举(drop-table/delete-without-where=Critical;
  # sqlite3-stdin=High;vacuum-into=Medium;stdin-unverified=High)。
  # dcg safe_pattern(4 条:select-query/sqlite3-dot-command/dot-command-standalone/
  # explain)无需 post_exclude:destructive 正则只匹配破坏性 SQL 关键字,
  # read 操作(SELECT/EXPLAIN/.schema/.tables/.dump/.backup)不匹配。
  # delete-without-where 正则比 mysql/pg 简单(无引号标识符),忠实 dcg sqlite 源。

  - id: destructive.database.sqlite.stdin-unverified
    severity: high
    asset_type: hook
    description: "sqlite3 receives indirect input that dcg cannot statically verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "sqlite.stdin-unverified" }
    remediation: "Materialize and review the exact SQL before piping or redirecting it into sqlite3."

  - id: destructive.database.sqlite.drop-table
    severity: critical
    asset_type: hook
    description: "DROP TABLE permanently deletes the table (even with IF EXISTS). Verify it is intended."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
        - { field: content, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
        - { field: allow, op: regex_match, value: "(?i)\\bDROP\\s+TABLE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "sqlite.drop-table" }
    remediation: "View structure first: .schema tablename. Backup: .dump tablename or .backup before dropping."

  - id: destructive.database.sqlite.delete-without-where
    severity: critical
    asset_type: hook
    description: "DELETE without WHERE deletes ALL rows. Add a WHERE clause."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+[a-zA-Z_][a-zA-Z0-9_]*\\s*(?:;|$)" }
        - { field: content, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+[a-zA-Z_][a-zA-Z0-9_]*\\s*(?:;|$)" }
        - { field: allow, op: regex_match, value: "(?i)DELETE\\s+FROM\\s+[a-zA-Z_][a-zA-Z0-9_]*\\s*(?:;|$)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "sqlite.delete-without-where" }
    remediation: "Check row count first: SELECT COUNT(*) FROM table. Add WHERE clause or use transactions: BEGIN; DELETE ...; verify; COMMIT/ROLLBACK."

  - id: destructive.database.sqlite.vacuum-into
    severity: medium
    asset_type: hook
    description: "VACUUM INTO overwrites the target file if it exists."
    match:
      or:
        - { field: command, op: regex_match, value: "(?i)VACUUM\\s+INTO\\s+" }
        - { field: content, op: regex_match, value: "(?i)VACUUM\\s+INTO\\s+" }
        - { field: allow, op: regex_match, value: "(?i)VACUUM\\s+INTO\\s+" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "sqlite.vacuum-into" }
    remediation: "Check if target file exists before running. Use a unique filename with timestamp."

  - id: destructive.database.sqlite.sqlite3-stdin
    severity: high
    asset_type: hook
    description: "Running SQL from file could contain destructive commands. Review the file first."
    match:
      or:
        - { field: command, op: regex_match, value: "sqlite3\\s+[^\\s]+\\s+<\\s+" }
        - { field: content, op: regex_match, value: "sqlite3\\s+[^\\s]+\\s+<\\s+" }
        - { field: allow, op: regex_match, value: "sqlite3\\s+[^\\s]+\\s+<\\s+" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "sqlite.sqlite3-stdin" }
    remediation: "Review the SQL file contents first. Use .backup before running. Wrap file contents in BEGIN/COMMIT."

  # ===== database.snowflake 域(源 dcg database/snowflake.rs,50 dest + 0 safe)=====
  # snowflake 特殊:50 条规则匹配 snow sql 内联 SQL。本 Task 先纯正则转写(匹配
  # SQL 关键字),Task 9 重写 SQL lexer 后改走语义求值。
  # severity 直接映射 dcg 枚举(见各规则)。
  # 语义规则(前 40):dcg 源 regex 为 (?!)(不可满足),由 scan_sql 语义层求值。
  # sentinel 纯正则版用 snow\b.*\b<SQL_KEYWORDS>\b 近似匹配,不精确(可能匹配
  # 注释/字符串中的关键字)但可接受 — Task 9 的 lexer 修复。
  # CLI 规则(后 10):dcg 源 regex 直接转写(匹配 snow <subcommand> drop 形态)。
  # 0 safe_pattern → 无 post_exclude。

  # --- 语义规则(40 条)---

  - id: destructive.database.snowflake.stdin-unverified
    severity: high
    asset_type: hook
    description: "snow sql receives SQL or a source that dcg cannot completely verify."
    match:
      or:
        - { field: command, op: regex_match, value: "(?!)" }
        - { field: content, op: regex_match, value: "(?!)" }
        - { field: allow, op: regex_match, value: "(?!)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.stdin-unverified" }
    remediation: "Materialize the exact rendered SQL, keep all !source inputs local, and review every statement before execution."

  - id: destructive.database.snowflake.drop-database
    severity: critical
    asset_type: hook
    description: "DROP DATABASE removes the database and every contained schema and object."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+DATABASE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+DATABASE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+DATABASE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-database" }
    remediation: "Verify with SHOW DATABASES and consider CREATE DATABASE <name>_backup CLONE <name> first."

  - id: destructive.database.snowflake.drop-schema
    severity: critical
    asset_type: hook
    description: "DROP SCHEMA removes the schema and can remove all contained objects."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+SCHEMA\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+SCHEMA\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+SCHEMA\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-schema" }
    remediation: "Review schema contents, prefer RESTRICT, and clone the schema before broad DDL."

  - id: destructive.database.snowflake.drop-table
    severity: critical
    asset_type: hook
    description: "DROP TABLE removes the active table and its data."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:TABLE|EXTERNAL\\s+TABLE|EVENT\\s+TABLE|HYBRID\\s+TABLE|ICEBERG\\s+TABLE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:TABLE|EXTERNAL\\s+TABLE|EVENT\\s+TABLE|HYBRID\\s+TABLE|ICEBERG\\s+TABLE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:TABLE|EXTERNAL\\s+TABLE|EVENT\\s+TABLE|HYBRID\\s+TABLE|ICEBERG\\s+TABLE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-table" }
    remediation: "Verify the target, inspect retention, and create a zero-copy clone before dropping."

  - id: destructive.database.snowflake.replace-database
    severity: critical
    asset_type: hook
    description: "CREATE OR REPLACE DATABASE replaces a live database."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+DATABASE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+DATABASE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+DATABASE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.replace-database" }
    remediation: "Create and validate a separate database or clone instead of replacing the active database."

  - id: destructive.database.snowflake.replace-schema
    severity: critical
    asset_type: hook
    description: "CREATE OR REPLACE SCHEMA replaces a live schema."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+SCHEMA\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+SCHEMA\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+SCHEMA\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.replace-schema" }
    remediation: "Clone the schema and test the migration against the clone before changing production."

  - id: destructive.database.snowflake.replace-table
    severity: critical
    asset_type: hook
    description: "CREATE OR REPLACE TABLE replaces the active table."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+(?:TABLE|EXTERNAL\\s+TABLE|EVENT\\s+TABLE|HYBRID\\s+TABLE|ICEBERG\\s+TABLE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+(?:TABLE|EXTERNAL\\s+TABLE|EVENT\\s+TABLE|HYBRID\\s+TABLE|ICEBERG\\s+TABLE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+(?:TABLE|EXTERNAL\\s+TABLE|EVENT\\s+TABLE|HYBRID\\s+TABLE|ICEBERG\\s+TABLE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.replace-table" }
    remediation: "Build and validate a separate table or clone, then use a reviewed cutover operation."

  - id: destructive.database.snowflake.truncate-table
    severity: critical
    asset_type: hook
    description: "TRUNCATE TABLE removes every row from the target table."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bTRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bTRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bTRUNCATE\\s+(?:TABLE\\s+)?[a-zA-Z_]" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.truncate-table" }
    remediation: "Preview the row count and clone the table before truncating."

  - id: destructive.database.snowflake.delete-all
    severity: critical
    asset_type: hook
    description: "DELETE without a top-level WHERE clause removes every row."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDELETE\\s+FROM\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDELETE\\s+FROM\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDELETE\\s+FROM\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.delete-all" }
    remediation: "Add a reviewed WHERE predicate and run the equivalent SELECT and COUNT first."
    # 注意:纯正则版不区分有无 WHERE,bounded-delete 规则单独处理带 WHERE 的 DELETE。

  - id: destructive.database.snowflake.update-all
    severity: critical
    asset_type: hook
    description: "UPDATE without a top-level WHERE clause modifies every row."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bUPDATE\\s+\\S+\\s+SET\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bUPDATE\\s+\\S+\\s+SET\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bUPDATE\\s+\\S+\\s+SET\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.update-all" }
    remediation: "Add a reviewed WHERE predicate and preview the exact target rows first."

  - id: destructive.database.snowflake.drop-data-product
    severity: high
    asset_type: hook
    description: "DROP removes a live view, materialized view, or dynamic table."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:VIEW|MATERIALIZED\\s+VIEW|DYNAMIC\\s+TABLE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:VIEW|MATERIALIZED\\s+VIEW|DYNAMIC\\s+TABLE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:VIEW|MATERIALIZED\\s+VIEW|DYNAMIC\\s+TABLE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-data-product" }
    remediation: "Inspect dependencies and validate a replacement object before removing the live query surface."

  - id: destructive.database.snowflake.drop-ingestion-object
    severity: high
    asset_type: hook
    description: "DROP removes a live stage, pipe, stream, or task."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:STAGE|PIPE|STREAM|TASK)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:STAGE|PIPE|STREAM|TASK)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:STAGE|PIPE|STREAM|TASK)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-ingestion-object" }
    remediation: "Inspect pipeline dependencies and state before removing an ingestion or scheduling object."

  - id: destructive.database.snowflake.drop-warehouse
    severity: high
    asset_type: hook
    description: "DROP WAREHOUSE removes compute used by applications, tasks, or users."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+WAREHOUSE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+WAREHOUSE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+WAREHOUSE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-warehouse" }
    remediation: "Inspect warehouse consumers and prefer a reversible suspend after reviewing active workloads."

  - id: destructive.database.snowflake.drop-principal
    severity: high
    asset_type: hook
    description: "DROP USER or DROP ROLE can break services and revoke access hierarchies."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:USER|ROLE|DATABASE\\s+ROLE|APPLICATION\\s+ROLE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:USER|ROLE|DATABASE\\s+ROLE|APPLICATION\\s+ROLE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:USER|ROLE|DATABASE\\s+ROLE|APPLICATION\\s+ROLE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-principal" }
    remediation: "Review grants and dependencies, then disable access reversibly before deleting a principal."

  - id: destructive.database.snowflake.drop-security-object
    severity: high
    asset_type: hook
    description: "DROP removes a live integration, network policy, or share."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:INTEGRATION|API\\s+INTEGRATION|SECURITY\\s+INTEGRATION|STORAGE\\s+INTEGRATION|NOTIFICATION\\s+INTEGRATION|EXTERNAL\\s+ACCESS\\s+INTEGRATION|NETWORK\\s+POLICY|SHARE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:INTEGRATION|API\\s+INTEGRATION|SECURITY\\s+INTEGRATION|STORAGE\\s+INTEGRATION|NOTIFICATION\\s+INTEGRATION|EXTERNAL\\s+ACCESS\\s+INTEGRATION|NETWORK\\s+POLICY|SHARE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:INTEGRATION|API\\s+INTEGRATION|SECURITY\\s+INTEGRATION|STORAGE\\s+INTEGRATION|NOTIFICATION\\s+INTEGRATION|EXTERNAL\\s+ACCESS\\s+INTEGRATION|NETWORK\\s+POLICY|SHARE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-security-object" }
    remediation: "Review all consumers, grants, and recovery options before removing the security or sharing object."

  - id: destructive.database.snowflake.drop-programmable-object
    severity: medium
    asset_type: hook
    description: "DROP removes a file format, sequence, function, or procedure used by workloads."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:FILE\\s+FORMAT|SEQUENCE|FUNCTION|EXTERNAL\\s+FUNCTION|PROCEDURE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:FILE\\s+FORMAT|SEQUENCE|FUNCTION|EXTERNAL\\s+FUNCTION|PROCEDURE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDROP\\s+(?:FILE\\s+FORMAT|SEQUENCE|FUNCTION|EXTERNAL\\s+FUNCTION|PROCEDURE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.drop-programmable-object" }
    remediation: "Inspect object dependencies and preserve the current definition before removal."

  - id: destructive.database.snowflake.remove-stage-files
    severity: high
    asset_type: hook
    description: "REMOVE deletes files from an internal Snowflake stage."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bREMOVE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bREMOVE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bREMOVE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.remove-stage-files" }
    remediation: "LIST the exact stage path and verify retention or a backup before removing files."

  - id: destructive.database.snowflake.pause-pipe
    severity: high
    asset_type: hook
    description: "ALTER PIPE pauses ingestion and can silently make downstream data stale."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+PIPE\\b.*PIPE_EXECUTION_PAUSED\\s+TRUE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+PIPE\\b.*PIPE_EXECUTION_PAUSED\\s+TRUE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+PIPE\\b.*PIPE_EXECUTION_PAUSED\\s+TRUE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.pause-pipe" }
    remediation: "Inspect pipe status and downstream freshness requirements before pausing ingestion."

  - id: destructive.database.snowflake.suspend-task
    severity: high
    asset_type: hook
    description: "ALTER TASK SUSPEND stops scheduled execution."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+TASK\\b.*\\bSUSPEND\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+TASK\\b.*\\bSUSPEND\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+TASK\\b.*\\bSUSPEND\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.suspend-task" }
    remediation: "Inspect task dependencies and active runs before suspending the task."

  - id: destructive.database.snowflake.execute-task
    severity: high
    asset_type: hook
    description: "EXECUTE TASK immediately starts a task run and may cascade a task graph."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bEXECUTE\\s+TASK\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bEXECUTE\\s+TASK\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bEXECUTE\\s+TASK\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.execute-task" }
    remediation: "Inspect the task definition, owner privileges, graph dependencies, and active runs before forcing execution."

  - id: destructive.database.snowflake.suspend-warehouse
    severity: high
    asset_type: hook
    description: "ALTER WAREHOUSE SUSPEND can interrupt active or queued workloads."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+WAREHOUSE\\b.*\\bSUSPEND\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+WAREHOUSE\\b.*\\bSUSPEND\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+WAREHOUSE\\b.*\\bSUSPEND\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.suspend-warehouse" }
    remediation: "Inspect active queries and dependent tasks before suspending compute."

  - id: destructive.database.snowflake.broad-revoke
    severity: high
    asset_type: hook
    description: "REVOKE removes broad privileges or role membership and can break applications immediately."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bREVOKE\\b.*\\b(?:ALL|ACCOUNT|OWNERSHIP|ROLE|DATABASE\\s+ROLE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bREVOKE\\b.*\\b(?:ALL|ACCOUNT|OWNERSHIP|ROLE|DATABASE\\s+ROLE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bREVOKE\\b.*\\b(?:ALL|ACCOUNT|OWNERSHIP|ROLE|DATABASE\\s+ROLE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.broad-revoke" }
    remediation: "Review current grants and identify every affected principal before revoking access."

  - id: destructive.database.snowflake.broad-grant
    severity: high
    asset_type: hook
    description: "GRANT creates account-wide, all-privilege, or ACCOUNTADMIN access."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bGRANT\\b.*\\b(?:ALL\\b|ON\\s+ACCOUNT\\b|ROLE\\s+ACCOUNTADMIN\\b)" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bGRANT\\b.*\\b(?:ALL\\b|ON\\s+ACCOUNT\\b|ROLE\\s+ACCOUNTADMIN\\b)" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bGRANT\\b.*\\b(?:ALL\\b|ON\\s+ACCOUNT\\b|ROLE\\s+ACCOUNTADMIN\\b)" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.broad-grant" }
    remediation: "Grant only the required privileges on specific objects to a least-privilege role."

  - id: destructive.database.snowflake.transfer-ownership
    severity: high
    asset_type: hook
    description: "GRANT OWNERSHIP transfers control and can revoke or copy existing grants."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bGRANT\\s+OWNERSHIP\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bGRANT\\s+OWNERSHIP\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bGRANT\\s+OWNERSHIP\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.transfer-ownership" }
    remediation: "Inventory outbound privileges and review COPY/REVOKE CURRENT GRANTS semantics before transferring ownership."

  - id: destructive.database.snowflake.alter-table-drop-column
    severity: high
    asset_type: hook
    description: "ALTER TABLE DROP COLUMN removes a column and its active data."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\bDROP\\s+COLUMN\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\bDROP\\s+COLUMN\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\bDROP\\s+COLUMN\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.alter-table-drop-column" }
    remediation: "Clone the table and validate all downstream consumers before removing the column."

  - id: destructive.database.snowflake.alter-table-swap
    severity: high
    asset_type: hook
    description: "ALTER TABLE SWAP WITH exchanges table identities atomically."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\bSWAP\\s+WITH\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\bSWAP\\s+WITH\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\bSWAP\\s+WITH\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.alter-table-swap" }
    remediation: "Verify both fully qualified tables and compare row counts and schemas before swapping."

  - id: destructive.database.snowflake.insert-overwrite
    severity: high
    asset_type: hook
    description: "INSERT OVERWRITE replaces the target table's current rows."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bINSERT\\s+OVERWRITE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bINSERT\\s+OVERWRITE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bINSERT\\s+OVERWRITE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.insert-overwrite" }
    remediation: "Write to and validate a separate table before a reviewed cutover."

  - id: destructive.database.snowflake.copy-overwrite
    severity: high
    asset_type: hook
    description: "COPY INTO a location with OVERWRITE = TRUE can replace exported files."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bCOPY\\s+INTO\\b.*\\bOVERWRITE\\s*=\\s*TRUE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bCOPY\\s+INTO\\b.*\\bOVERWRITE\\s*=\\s*TRUE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bCOPY\\s+INTO\\b.*\\bOVERWRITE\\s*=\\s*TRUE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.copy-overwrite" }
    remediation: "Export to a versioned path and LIST the destination before copying."

  - id: destructive.database.snowflake.put-overwrite
    severity: high
    asset_type: hook
    description: "PUT with OVERWRITE = TRUE can replace files in an internal stage."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bPUT\\b.*\\bOVERWRITE\\s*=\\s*TRUE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bPUT\\b.*\\bOVERWRITE\\s*=\\s*TRUE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bPUT\\b.*\\bOVERWRITE\\s*=\\s*TRUE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.put-overwrite" }
    remediation: "Upload to a versioned stage path and LIST existing files first."

  - id: destructive.database.snowflake.replace-live-object
    severity: high
    asset_type: hook
    description: "CREATE OR REPLACE replaces a live Snowflake object and may lose grants, state, or configuration."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+(?:PIPE|STREAM|TASK|STAGE|INTEGRATION|API\\s+INTEGRATION|SECURITY\\s+INTEGRATION|STORAGE\\s+INTEGRATION|NOTIFICATION\\s+INTEGRATION|EXTERNAL\\s+ACCESS\\s+INTEGRATION|CATALOG\\s+INTEGRATION|SHARE|PROCEDURE|FUNCTION|EXTERNAL\\s+FUNCTION|VIEW|MATERIALIZED\\s+VIEW|DYNAMIC\\s+TABLE)\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+(?:PIPE|STREAM|TASK|STAGE|INTEGRATION|API\\s+INTEGRATION|SECURITY\\s+INTEGRATION|STORAGE\\s+INTEGRATION|NOTIFICATION\\s+INTEGRATION|EXTERNAL\\s+ACCESS\\s+INTEGRATION|CATALOG\\s+INTEGRATION|SHARE|PROCEDURE|FUNCTION|EXTERNAL\\s+FUNCTION|VIEW|MATERIALIZED\\s+VIEW|DYNAMIC\\s+TABLE)\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bCREATE\\s+OR\\s+REPLACE\\s+(?:PIPE|STREAM|TASK|STAGE|INTEGRATION|API\\s+INTEGRATION|SECURITY\\s+INTEGRATION|STORAGE\\s+INTEGRATION|NOTIFICATION\\s+INTEGRATION|EXTERNAL\\s+ACCESS\\s+INTEGRATION|CATALOG\\s+INTEGRATION|SHARE|PROCEDURE|FUNCTION|EXTERNAL\\s+FUNCTION|VIEW|MATERIALIZED\\s+VIEW|DYNAMIC\\s+TABLE)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.replace-live-object" }
    remediation: "Create and validate a separate object before changing the live definition."

  - id: destructive.database.snowflake.bounded-delete
    severity: medium
    asset_type: hook
    description: "DELETE mutates every row selected by its WHERE predicate."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bDELETE\\s+FROM\\b.*\\bWHERE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bDELETE\\s+FROM\\b.*\\bWHERE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bDELETE\\s+FROM\\b.*\\bWHERE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.bounded-delete" }
    remediation: "Run the equivalent SELECT and COUNT against a clone before deleting rows."

  - id: destructive.database.snowflake.bounded-update
    severity: medium
    asset_type: hook
    description: "UPDATE mutates every row selected by its WHERE predicate."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bUPDATE\\s+\\S+\\s+SET\\b.*\\bWHERE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bUPDATE\\s+\\S+\\s+SET\\b.*\\bWHERE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bUPDATE\\s+\\S+\\s+SET\\b.*\\bWHERE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.bounded-update" }
    remediation: "Preview affected rows and validate the update against a clone first."

  - id: destructive.database.snowflake.merge-data
    severity: medium
    asset_type: hook
    description: "MERGE can update, insert, or delete rows based on source matching."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bMERGE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bMERGE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bMERGE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.merge-data" }
    remediation: "Validate source uniqueness and preview matched and unmatched rows against a clone."

  - id: destructive.database.snowflake.copy-into-table
    severity: medium
    asset_type: hook
    description: "COPY INTO a table can load duplicate, corrupt, or unexpected data."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bCOPY\\s+INTO\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bCOPY\\s+INTO\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bCOPY\\s+INTO\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.copy-into-table" }
    remediation: "Validate the staged files and load into a clone or scratch table first."
    # 注意:纯正则版 copy-overwrite 与 copy-into-table 都匹配 COPY INTO,
    # 但 copy-overwrite 额外要求 OVERWRITE=TRUE。两者可能同时命中(可接受)。

  - id: destructive.database.snowflake.rename-object
    severity: medium
    asset_type: hook
    description: "Renaming a database, schema, or table can break fully qualified consumers."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+(?:DATABASE|SCHEMA|TABLE)\\b.*\\bRENAME\\s+TO\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+(?:DATABASE|SCHEMA|TABLE)\\b.*\\bRENAME\\s+TO\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+(?:DATABASE|SCHEMA|TABLE)\\b.*\\bRENAME\\s+TO\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.rename-object" }
    remediation: "Inventory consumers and stage a coordinated cutover before renaming the object."

  - id: destructive.database.snowflake.alter-column
    severity: medium
    asset_type: hook
    description: "ALTER TABLE ALTER COLUMN can break writes and downstream consumers."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\b(?:ALTER|MODIFY)\\s+COLUMN\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\b(?:ALTER|MODIFY)\\s+COLUMN\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+TABLE\\b.*\\b(?:ALTER|MODIFY)\\s+COLUMN\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.alter-column" }
    remediation: "Validate type, nullability, default, and policy changes against a clone first."

  - id: destructive.database.snowflake.warehouse-settings
    severity: medium
    asset_type: hook
    description: "ALTER WAREHOUSE SET can create availability or cost risk."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bALTER\\s+WAREHOUSE\\b.*\\bSET\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bALTER\\s+WAREHOUSE\\b.*\\bSET\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bALTER\\s+WAREHOUSE\\b.*\\bSET\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.warehouse-settings" }
    remediation: "Review active consumers, size, scaling, and auto-suspend settings before applying changes."

  - id: destructive.database.snowflake.abort-query
    severity: medium
    asset_type: hook
    description: "!abort cancels an active Snowflake query."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*!abort\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*!abort\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*!abort\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.abort-query" }
    remediation: "Inspect query history and confirm the exact query ID before aborting it."

  - id: destructive.database.snowflake.interactive-edit
    severity: high
    asset_type: hook
    description: "!edit executes SQL modified in an external editor that dcg cannot inspect in advance."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*!edit\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*!edit\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*!edit\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.interactive-edit" }
    remediation: "Materialize the final SQL in a reviewed local file and execute it with snow sql -f."

  - id: destructive.database.snowflake.execute-immediate
    severity: medium
    asset_type: hook
    description: "EXECUTE IMMEDIATE runs generated SQL whose rendered semantics require explicit review."
    match:
      or:
        - { field: command, op: regex_match, value: "snow\\b.*\\bEXECUTE\\s+IMMEDIATE\\b" }
        - { field: content, op: regex_match, value: "snow\\b.*\\bEXECUTE\\s+IMMEDIATE\\b" }
        - { field: allow, op: regex_match, value: "snow\\b.*\\bEXECUTE\\s+IMMEDIATE\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.execute-immediate" }
    remediation: "Materialize and review the exact rendered SQL, including templates and variables, before executing it."

  # --- CLI 规则(10 条,dcg 源 regex 直接转写)---

  - id: destructive.database.snowflake.cli-object-drop-database
    severity: critical
    asset_type: hook
    description: "snow object drop database/schema removes the object and everything inside it."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+object\\s+drop\\s+(?:database|schema)\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+object\\s+drop\\s+(?:database|schema)\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+object\\s+drop\\s+(?:database|schema)\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-object-drop-database" }
    remediation: "Verify with snow object list database / snow object describe. Consider CREATE DATABASE <name>_backup CLONE <name> first."

  - id: destructive.database.snowflake.cli-object-drop
    severity: high
    asset_type: hook
    description: "snow object drop permanently removes a Snowflake object."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+object\\s+drop\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+object\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+object\\s+drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-object-drop" }
    remediation: "Inspect first with snow object describe <type> <name>. --force skips the confirmation prompt."

  - id: destructive.database.snowflake.cli-stage-drop
    severity: high
    asset_type: hook
    description: "snow stage drop removes the stage; internal staged files are not recoverable."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+stage\\s+drop\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+stage\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+stage\\s+drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-stage-drop" }
    remediation: "List contents first with snow stage list-files <stage>. Dropped stages cannot be recovered."

  - id: destructive.database.snowflake.cli-stage-remove
    severity: high
    asset_type: hook
    description: "snow stage remove deletes files from a stage."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+stage\\s+remove\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+stage\\s+remove\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+stage\\s+remove\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-stage-remove" }
    remediation: "Preview with snow stage list-files <stage> and consider copying the files out first."

  - id: destructive.database.snowflake.cli-app-teardown
    severity: high
    asset_type: hook
    description: "snow app teardown drops the Native App and (with --cascade) its owned objects."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+app\\s+teardown\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+app\\s+teardown\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+app\\s+teardown\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-app-teardown" }
    remediation: "snow app teardown drops the application object and development artifacts. Anyone using the app loses access immediately."

  - id: destructive.database.snowflake.cli-app-version-drop
    severity: medium
    asset_type: hook
    description: "snow app version drop removes a Native App version definition."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+app\\s+version\\s+drop\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+app\\s+version\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+app\\s+version\\s+drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-app-version-drop" }
    remediation: "Dropping an application package version prevents new installs and upgrades of that version."

  - id: destructive.database.snowflake.cli-snowpark-drop
    severity: medium
    asset_type: hook
    description: "snow snowpark drop removes a deployed procedure or function from Snowflake."
    match:
      or:
        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+snowpark\\s+drop\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+snowpark\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+snowpark\\s+drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-snowpark-drop" }
