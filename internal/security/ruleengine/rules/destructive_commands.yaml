        - { field: command, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+spcs\\s+(?:service|compute-pool|image-repository)\\s+drop\\b" }
        - { field: content, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+spcs\\s+(?:service|compute-pool|image-repository)\\s+drop\\b" }
        - { field: allow, op: regex_match, value: "(?:^|[\\s;&|(])snow(?:\\s+--?[^\\s;&|]+(?:\\s+[^-\\s;&|][^\\s;&|]*)?)*\\s+spcs\\s+(?:service|compute-pool|image-repository)\\s+drop\\b" }
    metadata: { source: dcg, domain: database, dcg_rule_id: "snowflake.cli-spcs-drop" }
    remediation: "Dropping an SPCS service stops and removes the running workload. Dropping a compute pool removes compute for every service on it."

  - id: destructive.database.snowflake.cli-dbt-drop
    severity: medium
    asset_type: hook
